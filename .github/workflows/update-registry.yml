name: Update Plugin Registry
on:
  push:
    branches:
      - main
    paths:
      - '**/manifest.json'
      - '.github/workflows/update-registry.mjs'
  workflow_dispatch:

jobs:
  update-registry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.repository == 'hrzlgnm/noctalia-plugins' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Run registry update script
        run: node .github/workflows/update-registry.mjs

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet registry.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to registry.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in registry.json"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json
          git commit -m "chore: update plugin registry [skip ci]"
          git push

      - name: Upload registry artifact
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: updated-registry
          path: registry.json
